<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Playlist Songs</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            line-height: 1.6;
            margin: 0;
            padding: 20px;
            background-color: #f4f4f4;
        }
        h1 {
            color: #333;
        }
        table {
            width: 100%;
            border-collapse: collapse;
            margin-top: 20px;
            background-color: #fff;
        }
        th, td {
            padding: 12px;
            text-align: left;
            border-bottom: 1px solid #ddd;
        }
        th {
            background-color: #f2f2f2;
            font-weight: bold;
        }
        tr:hover {
            background-color: #f5f5f5;
        }
        .explicit {
            color: red;
            font-weight: bold;
        }
    </style>
</head>
<body>
    <h1>Playlist Songs</h1>
    {% if songs %}
        <table>
            <thead>
                <tr>
                    <th>Name</th>
                    <th>Artists</th>
                    <th>Album</th>
                    <th>Explicit</th>
                </tr>
            </thead>
            <tbody>
                {% for song in songs %}
                    <tr  {% if song.explicit %}class="explicit"{% endif %}>
                        <td>{{ song.name }}</td>
                        <td>{{ song.artists }}</td>
                        <td>{{ song.album }}</td>
                        <td>{% if song.explicit %}<span class="explicit">Yes</span>{% else %}No{% endif %}</td>
                    </tr>
                {% endfor %}
            </tbody>
        </table>
    {% else %}
        <p>No songs found in the playlist.</p>
    {% endif %}
</body>
</html>
